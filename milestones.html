<script>  
    async function checkAuth() {
    const { data: sessionData } = await window.supabaseClient.auth.getSession();

    if (sessionData?.session?.user) {
        return;
    }

    const { data } = await window.supabaseClient.auth.getUser();

    if (!data.user) {
        window.location.href = "auth.html";
    }
    }

    checkAuth();
</script>
