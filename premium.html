<body class="page-shell premium-page">
  <div class="app-container">
    <div class="page-content">
      <button class="back-link premium-back-btn" id="premiumBackBtn" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5"></path><path d="m12 19-7-7 7-7"></path></svg>

      <section class="premium-hero-card">

        <p class="subtitle" id="premiumSubtitle">Go deeper with full access to your milestone journey and the YogaUnnati community.</p>

        <div class="premium-benefits">
          <div class="premium-benefit">
            <span class="premium-benefit-icon" aria-hidden="true">&#10003;</span>
            <span>Track all milestone stages</span>
          </div>
          <div class="premium-benefit">
            <span class="premium-benefit-icon" aria-hidden="true">&#10003;</span>
            <span>See the community board</span>
          </div>
          <div class="premium-benefit">
            <span class="premium-benefit-icon" aria-hidden="true">&#10003;</span>
            <span>View member profiles and shared journeys</span>
          </div>
        </div>

        <button class="primary-btn premium-unlock-btn" id="premiumUnlockBtn" type="button">Unlock Premium</button>
        <a href="index.html" class="premium-secondary-link">Continue with free practice tools</a>
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script src="js/premiumPage.js"></script>
