<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#f7f3ed" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="YogaUnnati" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />
  <title>Member Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;500&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body class="page-shell member-page">
<div class="app-container">
  <div class="page-content">
    <a href="javascript:void(0)" class="back-link" id="memberBackLink">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5"></path><path d="m12 19-7-7 7-7"></path></svg>
      <span>Back</span>
    </a>

    <div class="profile-page-header">
      <h1 class="page-title">Member Profile</h1>
      <button id="memberLogoutBtn" class="logout-btn hidden" type="button" hidden>Logout</button>
    </div>
    <p class="subtitle">A look at the practice journey</p>

    <a href="profile.html" class="member-profile-edit-link hidden" id="memberProfileEditLink" hidden>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 7h-9"></path><path d="M14 17H4"></path><circle cx="7" cy="17" r="2"></circle><circle cx="17" cy="7" r="2"></circle></svg>
      <span>Edit Profile</span>
    </a>

    <section class="member-profile-card">
      <div class="member-profile-top">
        <div class="member-profile-avatar-shell">
          <img src="images/profile-placeholder.svg" alt="Member avatar" class="member-profile-avatar hidden" id="memberProfileAvatar" />
          <span class="member-profile-initial" id="memberProfileInitial">Y</span>
        </div>

        <div class="member-profile-copy">
          <h2 id="memberProfileName">Yoga Member</h2>
          <p class="member-profile-status" id="memberProfileStatus">Walking the path with steady practice.</p>
          <p class="member-profile-since" id="memberProfileSince">Practicing since -</p>
        </div>
      </div>

      <div class="member-profile-milestone">
        <span class="eyebrow-label">Current Milestone</span>
        <div class="member-profile-milestone-row">
          <div class="member-profile-milestone-icon" id="memberMilestoneIcon" aria-hidden="true"></div>
          <div>
            <strong id="memberMilestoneTitle">Sankalpa</strong>
            <p id="memberMilestoneLevel">Level 1</p>
          </div>
        </div>
      </div>
    </section>

    <section class="stats member-profile-stats">
      <div class="stat-card">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3.5" y="5" width="17" height="15.5" rx="2.5"></rect><path d="M8 3.5v3"></path><path d="M16 3.5v3"></path><path d="M3.5 9.5h17"></path></svg>
        <h2 id="memberTotalDays">0</h2>
        <p>Total Days</p>
      </div>

      <div class="stat-card">
        <img src="images/flame_icon.svg" alt="" aria-hidden="true">
        <h2 id="memberStreak">0</h2>
        <p>Day Streak</p>
      </div>
    </section>

    <div id="memberProfileActionsMount"></div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item" id="homeTab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 10.5 12 3l9 7.5"></path><path d="M5.5 9.5V21h13V9.5"></path><path d="M9.5 21v-6h5v6"></path></svg>
      <span>Home</span>
    </a>
    <a href="progress.html" class="nav-item" id="progressTab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3.5" y="5" width="17" height="15.5" rx="2.5"></rect><path d="M8 3.5v3"></path><path d="M16 3.5v3"></path><path d="M3.5 9.5h17"></path></svg>
      <span>Progress</span>
    </a>
    <a href="milestones.html" class="nav-item" id="milestonesTab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 4.5h8v3a4 4 0 0 1-8 0v-3Z"></path><path d="M6 6H4.8A1.8 1.8 0 0 0 3 7.8 3.2 3.2 0 0 0 6.2 11"></path><path d="M18 6h1.2A1.8 1.8 0 0 1 21 7.8 3.2 3.2 0 0 1 17.8 11"></path><path d="M12 11.5v3.5"></path><path d="M9.5 19.5h5"></path></svg>
      <span>Milestones</span>
    </a>
    <a href="community.html" class="nav-item" id="communityTab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 20a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4"></path><circle cx="10" cy="9" r="3"></circle><path d="M22 20a4 4 0 0 0-3-3.87"></path><path d="M16.5 6.2a3 3 0 1 1 0 5.6"></path></svg>
      <span>Community</span>
    </a>
  </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/analytics.js"></script>
<script src="js/practiceData.js"></script>
<script src="js/profileData.js"></script>
<script src="js/premiumAccess.js"></script>
<script src="js/pwa.js"></script>
<script src="js/pageTransition.js"></script>
<script src="js/memberProfile.js"></script>
</body>
</html>
