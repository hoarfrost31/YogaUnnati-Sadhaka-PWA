<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f3ed" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="YogaUnnati" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />
  <title>Install YogaUnnati on iPhone</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;500&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="install-page install-ios-page page-shell">
  <div class="install-shell">
    <section class="install-card install-card-ios">
      <span class="install-chip">YogaUnnati</span>

      <div class="install-hero">
        <img src="images/logo.png" alt="YogaUnnati logo" class="install-icon-mark" />
        <div class="install-hero-copy">
          <h1>Install on your iPhone.</h1>
          <p>Add YogaUnnati to your Home Screen so it opens like an app and stays easy to reach every day.</p>
        </div>
      </div>

      <div class="install-features-head">App Features</div>
      <figure class="install-shot-card install-shot-card-ios" id="installGuideVisual">
        <img src="images/install-ios.webp" alt="iPhone install instructions for YogaUnnati" class="install-shot-image" />
      </figure>

      <div class="install-actions">
        <button type="button" class="primary-btn install-primary-btn" id="installAppBtn">How to Install</button>
      </div>
    </section>
  </div>

  <script src="js/pwa.js"></script>
  <script src="js/installPage.js"></script>
</body>
</html>
