<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f3ed" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="YogaUnnati" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />
  <title>Install YogaUnnati</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;500&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="install-page page-shell">
  <div class="install-shell">
    <section class="install-card">
      <span class="install-chip">YogaUnnati</span>

      <div class="install-hero">
        <img src="images/logo.png" alt="YogaUnnati logo" class="install-icon-mark" />
        <div class="install-hero-copy">
          <h1>Install the YogaUnnati app.</h1>
          <p>Track your practice, follow your milestones, and open YogaUnnati like an app on your phone.</p>
        </div>
      </div>

      <div class="install-features-head">App Features</div>
      <figure class="install-shot-card" id="installGuideVisual">
        <img src="images/install-android.webp" alt="Android install preview for YogaUnnati" class="install-shot-image" />
      </figure>

      <div class="install-actions">
        <button type="button" class="primary-btn install-primary-btn" id="installAppBtn">Install YogaUnnati</button>
        <button type="button" class="install-helper-btn" id="installHelpBtn">Need Help Installing?</button>
      </div>

      <section class="install-help-card hidden" id="installHelpCard">
        <p>On Android, open the browser menu and choose <strong>Install app</strong> or <strong>Add to Home screen</strong>.</p>
        <button type="button" class="install-help-close" id="installHelpClose">Close</button>
      </section>
    </section>
  </div>

  <script src="js/pwa.js"></script>
  <script src="js/installPage.js"></script>
</body>
</html>
