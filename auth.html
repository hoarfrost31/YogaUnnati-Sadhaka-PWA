<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f7f3ed" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="YogaUnnati" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />
  <title>Auth</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;500&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css"/>
</head>

<body class="auth-body">

<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-brand">
      <img src="images/logo.png" class="logo-img" alt="YogaUnnati logo" />
      <div>
        <h1 class="auth-title">YogaUnnati</h1>
        <p class="auth-subtitle">Sign in to continue your yoga journey</p>
      </div>
    </div>

    <div class="auth-form">
      <input id="displayName" class="input" placeholder="Your Name (optional)">
      <input id="email" class="input" placeholder="Email">
      <input id="password" class="input" type="password" placeholder="Password">

      <button id="loginBtn" class="primary-btn">Login</button>
      <button id="signupBtn" class="secondary-btn">Create Account</button>
    </div>

    <p id="msg" class="auth-message"></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/analytics.js"></script>
<script src="js/pwa.js"></script>
<script src="js/auth.js"></script> 



</body>
</html>
