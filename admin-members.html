<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f3ed" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="YogaUnnati Admin" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />
  <title>Admin Members</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;500&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="page-shell admin-page">
  <div class="app-container admin-shell">
    <div class="page-content">
      <div class="admin-topbar">
        <a href="admin.html" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5"></path><path d="m12 19-7-7 7-7"></path></svg>
        <span>Back to Dashboard</span>
      </a>
        <button type="button" class="secondary-btn admin-inline-btn admin-logout-btn" data-admin-logout>Logout</button>
      </div>

      <div class="profile-page-header admin-list-header">
        <div>
          <h1 class="page-title">Members</h1>
          <p class="subtitle admin-subtitle">Search the member base and open detailed records.</p>
        </div>
        <a href="admin-create-member.html" class="secondary-btn admin-inline-btn">Create Member</a>
      </div>

      <section class="admin-card admin-search-card">
        <label class="field-label" for="adminMemberSearch">Search members</label>
        <input id="adminMemberSearch" class="input" type="search" placeholder="Search by name or member ID">
      </section>

      <section class="admin-card">
        <div class="admin-table-head">
          <p class="eyebrow-label">Directory</p>
          <span id="adminMemberResults" class="admin-results-count">0 members</span>
        </div>
        <div id="adminMembersList" class="admin-list-wrap">
          <div class="admin-empty-state">Loading members...</div>
        </div>
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/adminShared.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/practiceData.js"></script>
  <script src="js/profileData.js"></script>
  <script src="js/pwa.js"></script>
  <script src="js/pageTransition.js"></script>
  <script src="js/adminMembers.js"></script>
</body>
</html>
