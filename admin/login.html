<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f7f3ed" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Admin" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="../images/apple-touch-icon.png" />
  <title>Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;500&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css"/>
</head>

<body class="auth-body">
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-brand">
        <img src="../images/logo.png" class="logo-img" alt="YogaUnnati logo" width="512" height="512" decoding="async" />
        <div>
          <h1 class="auth-title">YogaUnnati</h1>
          <p class="auth-subtitle">Admin login</p>
        </div>
      </div>

      <div class="auth-form">
        <input id="email" class="input" type="email" placeholder="Admin Email">
        <input id="password" class="input" type="password" placeholder="Password">
        <button id="loginBtn" class="primary-btn">Login</button>
      </div>

      <p id="msg" class="auth-message"></p>

      <a href="../index.html" class="auth-link">Open App Home</a>
    </div>
  </div>

  <script>window.__YOGAUNNATI_ADMIN_LOGIN__ = true;</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="../js/supabaseClient.js"></script>
  <script src="../js/adminShared.js"></script>
  <script src="../js/analytics.js"></script>
  <script src="../js/pwa.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
