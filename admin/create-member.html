<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f3ed" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Admin" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="../images/apple-touch-icon.png" />
  <title>Create Member</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;500&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="page-shell admin-page">
  <div class="app-container admin-shell">
    <div class="page-content">
      <div class="admin-topbar">
        <a href="index.html" class="back-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5"></path><path d="m12 19-7-7 7-7"></path></svg>
          <span>Back to Dashboard</span>
        </a>
      </div>

      <section class="admin-hero-card">
        <div>
          <p class="eyebrow-label">Admin</p>
          <h1 class="page-title">Create Member</h1>
          <p class="subtitle admin-subtitle">Create a new member account and assign the starting membership from inside the admin panel.</p>
        </div>
      </section>

      <section class="admin-card admin-form-card">
        <div class="admin-card-head">
          <div>
            <p class="eyebrow-label">Member Details</p>
            <h2>New account</h2>
          </div>
        </div>

        <div class="admin-form-grid">
          <div>
            <label class="field-label" for="adminCreateDisplayName">Display Name</label>
            <input id="adminCreateDisplayName" class="input" placeholder="Member name">
          </div>
          <div>
            <label class="field-label" for="adminCreateEmail">Email</label>
            <input id="adminCreateEmail" class="input" type="email" placeholder="member@email.com">
          </div>
          <div>
            <label class="field-label" for="adminCreatePassword">Password</label>
            <input id="adminCreatePassword" class="input" type="password" placeholder="Minimum 6 characters">
          </div>
          <div>
            <label class="field-label" for="adminCreatePhone">Mobile Number</label>
            <input id="adminCreatePhone" class="input" type="tel" inputmode="numeric" placeholder="10-digit mobile number">
          </div>
          <div>
            <label class="field-label" for="adminCreateMembershipPlan">Membership Plan</label>
            <select id="adminCreateMembershipPlan" class="input">
              <option value="none">No membership yet</option>
              <option value="app">YogaUnnati App</option>
              <option value="online">YogaUnnati Online</option>
              <option value="studio">YogaUnnati Studio</option>
            </select>
          </div>
        </div>

        <div class="profile-form-actions admin-form-actions">
          <button id="adminCreateMemberBtn" class="primary-btn" type="button">Create Member</button>
        </div>

        <p id="adminCreateMemberMsg" class="auth-message admin-inline-message"></p>
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="../js/supabaseClient.js"></script>
  <script src="../js/adminShared.js"></script>
  <script src="../js/analytics.js"></script>
  <script src="../js/pwa.js"></script>
  <script src="../js/pageTransition.js"></script>
  <script src="../js/adminCreateMember.js"></script>
</body>
</html>
