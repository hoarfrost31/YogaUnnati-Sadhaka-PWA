<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f3ed" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Admin" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="../images/apple-touch-icon.png" />
  <title>Admin Members</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;500&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="page-shell admin-page">
  <div class="app-container admin-shell">
    <div class="page-content">
      <div class="admin-topbar admin-topbar-end">
        <button type="button" class="secondary-btn admin-inline-btn admin-logout-btn" data-admin-logout>Logout</button>
      </div>

      <div class="profile-page-header admin-list-header admin-shell-header">
        <div>
          <h1 class="page-title">YogaUnnati Admin Panel</h1>
        </div>
      </div>

      <div class="admin-tabs" role="tablist" aria-label="Admin navigation">
        <a href="index.html" class="admin-tab">Dashboard</a>
        <a href="members.html" class="admin-tab is-active" aria-current="page">Members</a>
      </div>

      <div class="profile-page-header admin-list-header">
        <div>
          <h1 class="page-title">Members</h1>
        </div>
        <a href="create-member.html" class="secondary-btn admin-inline-btn">Add Member</a>
      </div>

      <section class="admin-card admin-search-card">
        <label class="field-label" for="adminMemberSearch">Search members</label>
        <input id="adminMemberSearch" class="input" type="search" placeholder="Search by name or member ID">
      </section>

      <section class="admin-card">
        <div class="admin-table-head">
          <p class="eyebrow-label">Directory</p>
          <span id="adminMemberResults" class="admin-results-count">0 members</span>
        </div>
        <div id="adminMembersList" class="admin-list-wrap">
          <div class="admin-empty-state">Loading members...</div>
        </div>
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="../js/supabaseClient.js"></script>
  <script src="../js/adminShared.js"></script>
  <script src="../js/analytics.js"></script>
  <script src="../js/practiceData.js"></script>
  <script src="../js/profileData.js"></script>
  <script src="../js/pwa.js"></script>
  <script src="../js/pageTransition.js"></script>
  <script src="../js/adminMembers.js"></script>
</body>
</html>
